{% extends 'base.html' %}

{% block content %}

<style>

/* =========================
   TRAIN SHOP PAGE DESIGN
========================= */

body{
    background:#f4f7fc;
    font-family:'Poppins',sans-serif;
}

/* TITLE */

.shop-title{
    font-size:40px;
    font-weight:700;
    color:#0d1b2a;
    text-align:center;
    margin-bottom:40px;
    position:relative;
}

.shop-title::after{
    content:'';
    width:120px;
    height:4px;
    background:linear-gradient(to right,#007bff,#00c6ff);
    display:block;
    margin:10px auto 0;
    border-radius:10px;
}

/* CARD */

.train-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    background:#fff;
    transition:0.4s;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    height:100%;
}

.train-card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* IMAGE */

.train-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    transition:0.5s;
}

.train-card:hover img{
    transform:scale(1.08);
}

/* CARD BODY */

.train-card .card-body{
    padding:25px;
}

.train-name{
    font-size:22px;
    font-weight:700;
    color:#222;
    margin-bottom:12px;
}

.train-price{
    font-size:24px;
    color:#007bff;
    font-weight:700;
    margin-bottom:20px;
}

/* BUTTON */

.view-btn{
    background:linear-gradient(to right,#007bff,#00c6ff);
    border:none;
    padding:12px 25px;
    color:white;
    border-radius:50px;
    font-weight:600;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
}

.view-btn:hover{
    background:linear-gradient(to right,#0056b3,#0096c7);
    transform:scale(1.05);
    color:white;
}

/* RESPONSIVE */

@media(max-width:768px){

    .shop-title{
        font-size:30px;
    }

    .train-card img{
        height:180px;
    }

}

</style>

<div class="container py-5">

    <h2 class="shop-title">
        Train Shop
    </h2>

    <div class="row">

        {% for train in trains %}

        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

            <div class="card train-card">

                <img src="{{ train.image.url }}">

                <div class="card-body text-center">

                    <h5 class="train-name">
                        {{ train.name }}
                    </h5>

                    <p class="train-price">
                        ₹{{ train.price }}
                    </p>

                    <a href="{% url 'train_detail' train.id %}"
                       class="view-btn">
                        View Details
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
