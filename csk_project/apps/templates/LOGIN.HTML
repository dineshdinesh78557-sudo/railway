{% extends 'base.html' %}

{% block content %}

<style>

/* =========================
   LOGIN PAGE DESIGN
========================= */

body{
    background:linear-gradient(135deg,#eef4ff,#f7fbff);
    font-family:'Poppins',sans-serif;
}

/* LOGIN SECTION */

.login-section{
    min-height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGIN CARD */

.login-card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    background:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    transition:0.4s;
    position:relative;
}

.login-card:hover{
    transform:translateY(-6px);
    box-shadow:0 22px 50px rgba(0,0,0,0.12);
}

/* TOP BAR */

.login-card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:7px;
    background:linear-gradient(to right,#007bff,#00c6ff);
}

/* LEFT SIDE */

.login-left{
    background:linear-gradient(135deg,#007bff,#00c6ff);
    color:white;
    padding:60px 35px;
    height:100%;
    text-align:center;
}

.login-left h2{
    font-size:38px;
    font-weight:700;
    margin-bottom:20px;
}

.login-left p{
    font-size:16px;
    line-height:1.9;
    opacity:0.95;
}

.login-icon{
    font-size:70px;
    margin-bottom:25px;
}

/* RIGHT SIDE */

.login-right{
    padding:50px 40px;
}

.login-title{
    font-size:34px;
    font-weight:700;
    color:#0d1b2a;
    margin-bottom:30px;
    text-align:center;
}

/* LABELS */

.login-right label{
    font-weight:600;
    color:#333;
    margin-bottom:8px;
}

/* INPUTS */

.login-right input{
    width:100%;
    border:1px solid #dce4ec;
    border-radius:14px;
    padding:14px 16px;
    margin-top:8px;
    margin-bottom:20px;
    background:#f8fbff;
    transition:0.3s;
    outline:none;
}

.login-right input:focus{
    border-color:#007bff;
    background:white;
    box-shadow:0 0 10px rgba(0,123,255,0.15);
}

/* BUTTON */

.login-btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:50px;
    background:linear-gradient(to right,#007bff,#00c6ff);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.login-btn:hover{
    background:linear-gradient(to right,#0056b3,#0096c7);
    transform:scale(1.02);
}

/* EXTRA TEXT */

.extra-text{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:15px;
}

.extra-text a{
    color:#007bff;
    text-decoration:none;
    font-weight:600;
}

.extra-text a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */

@media(max-width:768px){

    .login-left{
        padding:40px 20px;
    }

    .login-right{
        padding:35px 25px;
    }

    .login-title{
        font-size:28px;
    }

}

</style>

<div class="container login-section">

    <div class="row justify-content-center w-100">

        <div class="col-lg-9">

            <div class="card login-card">

                <div class="row g-0">

                    <!-- LEFT SIDE -->

                    <div class="col-md-5">

                        <div class="login-left">

                            <div class="login-icon">
                                🚆
                            </div>

                            <h2>
                                Welcome Back
                            </h2>

                            <p>

                                Login to access your railway bookings,
                                tickets, schedules, and dashboard easily.

                            </p>

                        </div>

                    </div>

                    <!-- RIGHT SIDE -->

                    <div class="col-md-7">

                        <div class="login-right">

                            <h2 class="login-title">
                                Login
                            </h2>

                            <form method="POST">

                                {% csrf_token %}

                                <div class="mb-3">

                                    <label>
                                        Username
                                    </label>

                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           placeholder="Enter Username">

                                </div>

                                <div class="mb-3">

                                    <label>
                                        Password
                                    </label>

                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Enter Password">

                                </div>

                                <button class="login-btn">
                                    Login
                                </button>

                            </form>

                            <div class="extra-text">

                                Don't have an account?

                                <a href="{% url 'register' %}">
                                    Register
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
