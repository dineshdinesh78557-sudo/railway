{% extends 'base.html' %}

{% block content %}

<style>

/* =========================
   REGISTER PAGE DESIGN
========================= */

body{
    background:linear-gradient(135deg,#eef4ff,#f7fbff);
    font-family:'Poppins',sans-serif;
}

/* REGISTER SECTION */

.register-section{
    min-height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* REGISTER CARD */

.register-card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    background:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    transition:0.4s;
    position:relative;
}

.register-card:hover{
    transform:translateY(-6px);
    box-shadow:0 22px 50px rgba(0,0,0,0.12);
}

/* TOP BAR */

.register-card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:7px;
    background:linear-gradient(to right,#28a745,#20c997);
}

/* LEFT SIDE */

.register-left{
    background:linear-gradient(135deg,#28a745,#20c997);
    color:white;
    padding:60px 35px;
    height:100%;
    text-align:center;
}

.register-left h2{
    font-size:38px;
    font-weight:700;
    margin-bottom:20px;
}

.register-left p{
    font-size:16px;
    line-height:1.9;
    opacity:0.95;
}

.register-icon{
    font-size:70px;
    margin-bottom:25px;
}

/* RIGHT SIDE */

.register-right{
    padding:50px 40px;
}

.register-title{
    font-size:34px;
    font-weight:700;
    color:#0d1b2a;
    margin-bottom:30px;
    text-align:center;
}

/* LABELS */

.register-right label{
    font-weight:600;
    color:#333;
    margin-bottom:8px;
}

/* INPUTS */

.register-right input,
.register-right textarea,
.register-right select{
    width:100%;
    border:1px solid #dce4ec;
    border-radius:14px;
    padding:14px 16px;
    margin-top:8px;
    margin-bottom:20px;
    background:#f8fbff;
    transition:0.3s;
    outline:none;
}

.register-right input:focus,
.register-right textarea:focus,
.register-right select:focus{
    border-color:#28a745;
    background:white;
    box-shadow:0 0 10px rgba(40,167,69,0.15);
}

/* HELP TEXT */

.helptext{
    display:block;
    font-size:13px;
    color:#777;
    margin-top:-12px;
    margin-bottom:15px;
}

/* ERROR LIST */

.errorlist{
    list-style:none;
    padding:0;
    margin:0 0 10px;
    color:red;
    font-size:14px;
}

/* BUTTON */

.register-btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:50px;
    background:linear-gradient(to right,#28a745,#20c997);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.register-btn:hover{
    background:linear-gradient(to right,#1e7e34,#17a589);
    transform:scale(1.02);
}

/* EXTRA TEXT */

.extra-text{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:15px;
}

.extra-text a{
    color:#28a745;
    text-decoration:none;
    font-weight:600;
}

.extra-text a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */

@media(max-width:768px){

    .register-left{
        padding:40px 20px;
    }

    .register-right{
        padding:35px 25px;
    }

    .register-title{
        font-size:28px;
    }

}

</style>

<div class="container register-section">

    <div class="row justify-content-center w-100">

        <div class="col-lg-10">

            <div class="card register-card">

                <div class="row g-0">

                    <!-- LEFT SIDE -->

                    <div class="col-md-5">

                        <div class="register-left">

                            <div class="register-icon">
                                🚆
                            </div>

                            <h2>
                                Create Account
                            </h2>

                            <p>

                                Register now to book railway tickets,
                                manage reservations, download tickets,
                                and access your personal dashboard.

                            </p>

                        </div>

                    </div>

                    <!-- RIGHT SIDE -->

                    <div class="col-md-7">

                        <div class="register-right">

                            <h2 class="register-title">
                                Register
                            </h2>

                            <form method="POST">

                                {% csrf_token %}

                                {{ form.as_p }}

                                <button class="register-btn">
                                    Register
                                </button>

                            </form>

                            <div class="extra-text">

                                Already have an account?

                                <a href="{% url 'login' %}">
                                    Login
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
